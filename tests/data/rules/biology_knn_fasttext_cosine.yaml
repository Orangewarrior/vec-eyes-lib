report_name: Biology KNN FastText

data:
  hot_test_path: tests/data/biology/hot
  cold_test_path: tests/data/biology/cold
  hot_label: VIRUS
  cold_label: HUMAN
  recursive_way: On
  score_sum: On

pipeline:
  nlp: FastText
  threads: 2

model:
  method: KnnCosine
  k: 3

extra_match:
  - recursive_way: Off
    engine: Regex
    path: tests/data/rules/biology_alerts.yaml
    score_add_points: 0
