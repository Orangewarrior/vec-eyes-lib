report_name: UCI Fraud Isolation

data:
  hot_test_path: tests/data/uci_fraud/hot
  cold_test_path: tests/data/uci_fraud/cold
  hot_label: ANOMALY
  cold_label: RAW_DATA
  recursive_way: ON
  score_sum: OFF

pipeline:
  nlp: FastText

model:
  method: IsolationForest
  n_trees: 80
  contamination: 0.08
  subsample_size: 32
