report_name: Fraud KNN Minkowski

data:
  hot_test_path: tests/data/fraud/hot
  cold_test_path: tests/data/fraud/cold
  hot_label: ANOMALY
  cold_label: RAW_DATA
  recursive_way: On
  score_sum: On

pipeline:
  nlp: FastText
  threads: 2

model:
  method: KnnMinkowski
  k: 3
  p: 2.0

extra_match:
  - recursive_way: Off
    engine: Regex
    path: tests/data/rules/fraud_alerts.txt
    score_add_points: 25
    title: Fraud rules
    description: High-risk financial terms
