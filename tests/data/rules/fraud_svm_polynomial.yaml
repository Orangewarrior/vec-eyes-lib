report_name: UCI Fraud Polynomial SVM

data:
  hot_test_path: tests/data/uci_fraud/hot
  cold_test_path: tests/data/uci_fraud/cold
  hot_label: ANOMALY
  cold_label: RAW_DATA
  recursive_way: ON
  score_sum: OFF

pipeline:
  nlp: TfIdf

model:
  method: Svm
  kernel: Polynomial
  c: 1.3
  learning_rate: 0.07
  epochs: 55
  gamma: 0.40
  degree: 3
  coef0: 0.5
