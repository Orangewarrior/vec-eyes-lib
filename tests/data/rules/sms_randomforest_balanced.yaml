report_name: UCI SMS Balanced

data:
  hot_test_path: tests/data/uci_sms/hot
  cold_test_path: tests/data/uci_sms/cold
  hot_label: SPAM
  cold_label: RAW_DATA
  recursive_way: ON
  score_sum: OFF

pipeline:
  nlp: TfIdf

model:
  method: RandomForest
  mode: balanced
  n_trees: 41
  max_depth: 8
  max_features: sqrt
  min_samples_split: 2
  min_samples_leaf: 1
  bootstrap: true
  oob_score: true
