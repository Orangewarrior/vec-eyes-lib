report_name: UCI SMS ExtraTrees

data:
  hot_test_path: tests/data/uci_sms/hot
  cold_test_path: tests/data/uci_sms/cold
  hot_label: SPAM
  cold_label: RAW_DATA
  recursive_way: ON
  score_sum: OFF

pipeline:
  nlp: TfIdf

model:
  method: RandomForest
  mode: extra_trees
  n_trees: 61
  max_depth: 10
  max_features: log2
  min_samples_split: 2
  min_samples_leaf: 1
  bootstrap: true
  oob_score: true
