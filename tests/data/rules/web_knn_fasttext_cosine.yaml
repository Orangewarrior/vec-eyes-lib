report_name: Web Attack KNN FastText

data:
  hot_test_path: tests/data/web/hot
  cold_test_path: tests/data/web/cold
  hot_label: WEB_ATTACK
  cold_label: RAW_DATA
  recursive_way: On
  score_sum: On

pipeline:
  nlp: FastText
  threads: 2

model:
  method: KnnCosine
  k: 3

extra_match:
  - recursive_way: Off
    engine: Regex
    path: tests/data/rules/web_alerts.txt
    score_add_points: 20
    title: Web attack rules
    description: Regex rules inspired by public HTTP attack corpora
